<html>
    <head>
        <title>Pertemuan 2</title>
        <style>
            h1{
                font-family: 'Arial', sans-serif;
            }
        </style>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 style="color:rgb(0, 187, 255);">Form Pendaftaran Sederhana</h1>
    <form action="contoh.html" method="post">
        <label for="username">Nama Pengguna:</label>
        <input id="username" class="empat-a" type="text" name="username" placeholder="Masukkan Nama Pengguna">
        <br>
        <label for="gender">Jenis Kelamin:</label>
        <input type="radio" name="Jenis Kelamin" value="Laki-laki">Laki-laki
        <input type="radio" name="Jenis Kelamin" value="Perempuan">Perempuan
        <br>
        <label for="Hobi">Hobi:</label>
        <input type="checkbox" name="Hobi" value="Bernyanyi">Bernyanyi
        <input type="checkbox" name="Hobi" value="Menulis">Menulis
        <br>
        <label for="file">File:</label>
        <input type="file" name="file" accept="image/*">
        <button type="submit">Unggah</button>
    </form>
    </body>
</html>
